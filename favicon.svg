<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#0d0f14"/>

  <!-- Radar rings -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#f5c842" stroke-width="0.7" stroke-opacity="0.25"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#f5c842" stroke-width="0.7" stroke-opacity="0.25"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#f5c842" stroke-width="0.7" stroke-opacity="0.25"/>

  <!-- Cross lines -->
  <line x1="32" y1="6"  x2="32" y2="58" stroke="#f5c842" stroke-width="0.5" stroke-opacity="0.18"/>
  <line x1="6"  y1="32" x2="58" y2="32" stroke="#f5c842" stroke-width="0.5" stroke-opacity="0.18"/>

  <!-- Radar sweep (filled sector) -->
  <path d="M32 32 L32 6 A26 26 0 0 1 57.3 43 Z"
        fill="#f5c842" fill-opacity="0.08"/>
  <line x1="32" y1="32" x2="57.3" y2="43"
        stroke="#f5c842" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="32" y1="32" x2="32" y2="6"
        stroke="#f5c842" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Blip: 増加 (green) -->
  <circle cx="46" cy="18" r="3.2" fill="#3ddc84"/>
  <circle cx="46" cy="18" r="5.5" fill="none" stroke="#3ddc84" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Blip: 減少 (red) -->
  <circle cx="23" cy="40" r="2.2" fill="#ff5c5c" opacity="0.85"/>

  <!-- Blip: 新規 (gold) -->
  <circle cx="50" cy="35" r="2.5" fill="#f5c842"/>
  <circle cx="50" cy="35" r="4.5" fill="none" stroke="#f5c842" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#f5c842"/>
</svg>
