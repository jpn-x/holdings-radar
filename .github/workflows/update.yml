name: Daily Update

on:
  # push で index.html が更新されたとき GitHub Pages を自動ビルド
  push:
    branches: [master]
    paths:
      - "index.html"
      - "favicon.svg"
      - "companies_cache.json"

  # 手動 or スケジュール実行（EDINET_API_KEY が設定されていれば GitHub Actions からも動く）
  schedule:
    # 平日 18:00 JST = 09:00 UTC
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      target_date:
        description: "対象日 (YYYY-MM-DD) — 空欄で直近営業日"
        required: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    # push イベント以外（手動/スケジュール）のときのみ実行
    if: github.event_name != 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests pypdf

      # MSワラント行使ウォッチ（Yanoshin TDnet API + TDnet PDF直取得）
      # 失敗時は warrants.json を更新せず既存データを保持する設計
      - name: Warrant watch
        continue-on-error: true
        run: python scripts/warrant_watch.py

      - name: Run fetch
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python scripts/fetch.py

      - name: Commit & push
        run: |
          git config user.name  "holdings-radar[bot]"
          git config user.email "holdings-radar[bot]@users.noreply.github.com"
          git add index.html data/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            DATE=$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('Asia/Tokyo')).strftime('%Y-%m-%d'))")
            git commit -m "chore: update holdings data ${DATE}"
            git pull --rebase
            git push
          fi
