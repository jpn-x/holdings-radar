name: Fix Missing Codes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Fix missing sec codes
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python scripts/fix_missing_codes.py

      - name: Commit & push
        run: |
          git config user.name  "holdings-radar[bot]"
          git config user.email "holdings-radar[bot]@users.noreply.github.com"
          git add index.html data/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "fix: fill missing sec codes via XBRL re-fetch"
            git pull --rebase
            git push
          fi
