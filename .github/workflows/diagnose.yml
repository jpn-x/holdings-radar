name: Diagnose DocTypes
on:
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD"
        required: true
        default: "2026-06-11"
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install requests -q
      - name: Diagnose XBRL sample
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, os, zipfile, io, re
          API = "https://api.edinet-fsa.go.jp/api/v2"
          UA  = {"User-Agent": "diag/1.0"}
          KEY = os.environ.get("EDINET_API_KEY","")
          date = "${{ github.event.inputs.date }}"
          def p(**kw):
              if KEY: kw["Subscription-Key"] = KEY
              return kw
          # Get doc list
          r = requests.get(f"{API}/documents.json", params=p(date=date, type=2), headers=UA, timeout=60)
          docs = r.json().get("results",[])
          # Pick a doc with desc = 大量保有報告書 or 変更報告書 (non-特例, non-訂正)
          target = next((d for d in docs
              if d.get("docTypeCode") in {"350","360"}
              and d.get("docDescription","") in {"大量保有報告書","変更報告書"}
          ), None)
          if not target:  # fallback: any 350 without 特例
              target = next((d for d in docs
                  if d.get("docTypeCode") in {"350"}
                  and "特例" not in d.get("docDescription","")
                  and "訂正" not in d.get("docDescription","")
              ), None)
          if not target:
              print("No target doc found"); exit()
          doc_id = target["docID"]
          print(f"Fetching XBRL for {doc_id} ({target.get('filerName','')}) - {target.get('docDescription','')}")
          # Download zip
          r2 = requests.get(f"{API}/documents/{doc_id}", params=p(type=1), headers=UA, timeout=60, stream=True)
          raw = b"".join(r2.iter_content(65536))
          with zipfile.ZipFile(io.BytesIO(raw)) as zf:
              print("Files in zip:", zf.namelist())
              for name in zf.namelist():
                  if name.lower().endswith(".xbrl"):
                      txt = zf.read(name).decode("utf-8", errors="ignore")
                      print(f"\n--- {name} (first 3000 chars) ---")
                      # Show all data elements (not context/schema)
                      import re as re2
                      # Match full qualified name: <prefix:ElementName attrs>value</prefix:ElementName>
                      elems = re2.findall(
                          r'<((jplvh_cor|jplh_cor|jpdei_cor):\w+)[^>]*>\s*([^<]{1,200}?)\s*</\1\s*>',
                          txt)
                      for fullname, _ns, val in elems[:80]:
                          print(f"  {fullname}: {val.strip()}")
                      break
          EOF
