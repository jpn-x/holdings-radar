<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>大量保有 Radar</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
:root{
  --bg:#0d0f14;--surf:#161a23;--border:#252a35;
  --text:#e8ecf4;--muted:#8892a4;
  --gold:#f5c842;--green:#3ddc84;--red:#ff5c5c;--blue:#4fa8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.init{text-align:center;padding:48px;color:var(--muted)}
.init svg{display:block;margin:0 auto 20px}
.init p{font-size:15px;line-height:2}
.init code{color:var(--gold);font-size:13px}
</style>
</head>
<body>
<div class="init">
  <img src="favicon.svg" width="64" height="64" alt="">
  <p>GitHub Actions が初回実行されると<br>大量保有データが表示されます。<br><br>
  手動実行: <code>Actions → Daily Update → Run workflow</code></p>
</div>
</body>
</html>
